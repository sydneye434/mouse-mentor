# Render Blueprint: FastAPI backend + PostgreSQL
# Developed by Sydney Edwards
#
# Deploy: connect repo in Render → New Blueprint → select render.yaml
# Set CORS_ORIGINS to your Vercel URL (e.g. https://your-app.vercel.app)
# Set AI keys (GROQ_API_KEY / GEMINI_API_KEY) in the Render dashboard.

version: "1"

databases:
  - name: mouse-mentor-db
    databaseName: mousementor
    user: mousementor

services:
  - type: web
    name: mouse-mentor-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: mouse-mentor-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: groq
      - key: ENVIRONMENT
        value: production
